<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sanakirja</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Sanakirja</h1>
    <p class="subtitle">Finnish dictionary — EN · FR · DE · SV · IT</p>
    <div class="search-wrap">
      <input
        type="search"
        id="search"
        placeholder="Hae sanaa… (Search a word)"
        autocomplete="off"
        spellcheck="false"
      >
    </div>
    <p class="result-count" id="count"></p>
  </header>

  <main>
    <table id="results" aria-label="Dictionary results">
      <thead>
        <tr>
          <th class="lang-fi">🇫🇮 Suomi</th>
          <th class="lang-en">🇬🇧 English</th>
          <th class="lang-fr">🇫🇷 Français</th>
          <th class="lang-de">🇩🇪 Deutsch</th>
          <th class="lang-sv">🇸🇪 Svenska</th>
          <th class="lang-it">🇮🇹 Italiano</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <p class="empty" id="empty" hidden>No results found.</p>
  </main>

  <footer>
    <p>Data: <a href="https://github.com/hermitdave/FrequencyWords" target="_blank">FrequencyWords</a> &amp; <a href="https://www.apertium.org" target="_blank">Apertium</a></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
